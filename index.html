<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jenyadoesapps.com</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #111;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      line-height: 1.75;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    main { width: 100%; max-width: 460px; }

    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .name {
      font-size: 20px;
      font-weight: bold;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    p { color: #444; margin-bottom: 1rem; }

    .contact {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #999;
    }

    .contact a { color: #111; text-decoration: none; border-bottom: 1px solid #111; }
    .contact a:hover { color: #666; border-color: #666; }
  </style>
</head>
<body>
<main>

  <div class="header">
    <img src="logo.png" alt="" width="22" style="display:block;">

    <div class="name">jenyadoesapps</div>
  </div>

  <p>
    A studio that makes apps.
    Things built with care and meant to feel good to use.
  </p>

  <p>
    Based on the idea that software can be quiet and intentional —
    like a wanderer who only carries what matters.
  </p>

  <div class="contact">
    <span>// 2026</span>
    <a href="mailto:i@jenyadoesapps.com">i@jenyadoesapps.com</a>
  </div>

</main>
</body>
</html>
